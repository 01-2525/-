<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>2D ジャンプアクションゲーム</title>
    <style>
        /* 全体のリセットと中央配置 */
        body {
            margin: 0;
            padding: 0;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            background-color: #f0f0f0;
            font-family: sans-serif;
            overflow: hidden; /* スクロールバーを隠す */
        }

        /* ゲーム画面（キャンバス）のスタイル */
        canvas {
            background-color: #ffffff;
            border: 2px solid #333;
            box-shadow: 0 4px 10px rgba(0, 0, 0, 0.2);
            display: block;
        }

        /* ゲームオーバー画面のスタイル */
        #gameOverScreen {
            display: none; /* 初期状態は非表示 */
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            background-color: rgba(255, 255, 255, 0.95);
            padding: 30px 50px;
            border: 2px solid #333;
            border-radius: 10px;
            text-align: center;
            box-shadow: 0 4px 10px rgba(0, 0, 0, 0.3);
        }

        #gameOverScreen h2 {
            margin-top: 0;
            color: #d32f2f;
        }

        #scoreDisplay {
            font-size: 24px;
            font-weight: bold;
            margin: 20px 0;
        }

        button {
            padding: 10px 30px;
            font-size: 18px;
            cursor: pointer;
            background-color: #333;
            color: white;
            border: none;
            border-radius: 5px;
            transition: background-color 0.2s;
        }

        button:hover {
            background-color: #555;
        }
    </style>
</head>
<body>

    <canvas id="gameCanvas" width="800" height="400"></canvas>

    <div id="gameOverScreen">
        <h2>GAME OVER</h2>
        <div id="scoreDisplay">Score: <span id="finalScore">0</span></div>
        <button onclick="resetGame()">リトライ</button>
    </div>

    <script>
        const canvas = document.getElementById('gameCanvas');
        const ctx = canvas.getContext('2d');
        const gameOverScreen = document.getElementById('gameOverScreen');
        const finalScoreSpan = document.getElementById('finalScore');

        // ゲームの基本設定
        let animationId;
        let isGameOver = false;
        let score = 0;
        let frames = 0;
        let obstacles = [];
        let nextSpawnTime = 0;

        // プレイヤークラス
        class Player {
            constructor() {
                this.width = 40;
                this.height = 40;
                this.x = 80; // 画面左側に固定
                this.y = canvas.height - this.height;
                this.vy = 0; // Y軸の速度
                this.gravity = 0.8; // 重力
                this.jumpPower = -14; // ジャンプ力
                this.isGrounded = true; // 地面にいるかどうか
            }

            jump() {
                if (this.isGrounded) {
                    this.vy = this.jumpPower;
                    this.isGrounded = false;
                }
            }

            update() {
                // 重力の適用
                this.vy += this.gravity;
                this.y += this.vy;

                // 地面との当たり判定
                if (this.y >= canvas.height - this.height) {
                    this.y = canvas.height - this.height;
                    this.vy = 0;
                    this.isGrounded = true;
                }
            }

            draw() {
                ctx.fillStyle = '#1976d2'; // プレイヤーの色（青）
                ctx.fillRect(this.x, this.y, this.width, this.height);
            }
        }

        // 障害物クラス
        class Obstacle {
            constructor() {
                this.width = 30;
                // 高さをランダムに設定（30〜80px）
                this.height = Math.random() * 50 + 30; 
                this.x = canvas.width; // 画面右端から出現
                this.y = canvas.height - this.height;
                this.speed = 7; // スクロール速度
            }

            update() {
                this.x -= this.speed;
            }

            draw() {
                ctx.fillStyle = '#d32f2f'; // 障害物の色（赤）
                ctx.fillRect(this.x, this.y, this.width, this.height);
            }
        }

        let player;

        // ゲームの初期化
        function init() {
            player = new Player();
            obstacles = [];
            score = 0;
            frames = 0;
            isGameOver = false;
            nextSpawnTime = getRandomSpawnTime();
            gameOverScreen.style.display = 'none';
        }

        // ランダムな出現間隔を生成（フレーム単位: 40〜100フレーム）
        function getRandomSpawnTime() {
            return Math.floor(Math.random() * 60) + 40;
        }

        // 当たり判定（矩形同士の衝突検知）
        function checkCollision(rect1, rect2) {
            return (
                rect1.x < rect2.x + rect2.width &&
                rect1.x + rect1.width > rect2.x &&
                rect1.y < rect2.y + rect2.height &&
                rect1.y + rect1.height > rect2.y
            );
        }

        // ゲームループ
        function gameLoop() {
            if (isGameOver) return;

            // 画面のクリア
            ctx.clearRect(0, 0, canvas.width, canvas.height);

            // 背景（地面の線）の描画
            ctx.beginPath();
            ctx.moveTo(0, canvas.height);
            ctx.lineTo(canvas.width, canvas.height);
            ctx.strokeStyle = '#333';
            ctx.lineWidth = 4;
            ctx.stroke();

            // プレイヤーの更新と描画
            player.update();
            player.draw();

            // 障害物の生成
            frames++;
            if (frames >= nextSpawnTime) {
                obstacles.push(new Obstacle());
                frames = 0;
                nextSpawnTime = getRandomSpawnTime();
            }

            // 障害物の更新、描画、当たり判定
            for (let i = 0; i < obstacles.length; i++) {
                let obs = obstacles[i];
                obs.update();
                obs.draw();

                // 衝突チェック
                if (checkCollision(player, obs)) {
                    gameOver();
                }

                // 画面外に出た障害物を削除してスコアを加算
                if (obs.x + obs.width < 0) {
                    obstacles.splice(i, 1);
                    i--; // 配列がずれるのでインデックスを調整
                }
            }

            // スコア（生存時間）の加算と表示
            score++;
            ctx.fillStyle = '#333';
            ctx.font = '20px sans-serif';
            ctx.fillText(`Score: ${Math.floor(score / 10)}`, 20, 30);

            // 次のフレームを要求
            animationId = requestAnimationFrame(gameLoop);
        }

        // ゲームオーバー処理
        function gameOver() {
            isGameOver = true;
            cancelAnimationFrame(animationId);
            finalScoreSpan.textContent = Math.floor(score / 10);
            gameOverScreen.style.display = 'block';
        }

        // リトライボタンが押された時の処理
        function resetGame() {
            init();
            gameLoop();
        }

        // 操作のイベントリスナー
        // 1. マウスクリック（画面内のどこでも）
        window.addEventListener('mousedown', () => {
            if (!isGameOver) player.jump();
        });

        // スマホなどのタッチ操作にも対応
        window.addEventListener('touchstart', (e) => {
            if (!isGameOver) player.jump();
        });

        // 2. スペースキー
        window.addEventListener('keydown', (e) => {
            if (e.code === 'Space') {
                e.preventDefault(); // スペースキーによる画面スクロールを防ぐ
                if (!isGameOver) {
                    player.jump();
                } else {
                    // ゲームオーバー時にスペースキーでリトライできるようにする
                    resetGame();
                }
            }
        });

        // ゲーム開始
        init();
        gameLoop();
    </script>
</body>
</html>
